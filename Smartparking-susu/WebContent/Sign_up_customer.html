<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | That's My Spot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100">
  <div class="mx-auto flex min-h-screen max-w-6xl flex-col px-4 py-6">
    <header class="mb-8 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <img src="images/logo.jpg" alt="Logo" class="h-10 w-10 rounded-xl object-cover" />
        <span class="font-semibold">That's My Spot</span>
      </a>
      <a href="Sign_in_customer.html" class="rounded-lg border border-slate-600 px-4 py-2 text-sm hover:border-slate-400">Already have an account?</a>
    </header>

    <main class="grid flex-1 items-center gap-8 md:grid-cols-2">
      <section>
        <h1 class="text-4xl font-bold">Create your account</h1>
        <p class="mt-3 text-slate-300">Register once and quickly reserve parking spots for your vehicle.</p>
      </section>

      <section class="rounded-2xl border border-slate-800 bg-slate-900/80 p-6 shadow-2xl">
        <form action="Sign_up_cust_servlet" method="post" class="space-y-4">
          <div>
            <label class="mb-2 block text-sm text-slate-300" for="cust_name">Customer Name</label>
            <input id="cust_name" name="cust_name" type="text" required class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 outline-none ring-indigo-500/30 focus:ring" />
          </div>
          <div>
            <label class="mb-2 block text-sm text-slate-300" for="V_number">Vehicle Number</label>
            <input id="V_number" name="V_number" type="text" maxlength="10" required class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 outline-none ring-indigo-500/30 focus:ring" />
          </div>
          <div>
            <label class="mb-2 block text-sm text-slate-300" for="V_type">Vehicle Type (0 = Bike, 1 = Car)</label>
            <input id="V_type" name="V_type" type="text" maxlength="1" required class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 outline-none ring-indigo-500/30 focus:ring" />
          </div>
          <div>
            <label class="mb-2 block text-sm text-slate-300" for="cust_pwd">Password</label>
            <input id="cust_pwd" name="cust_pwd" type="password" required class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 outline-none ring-indigo-500/30 focus:ring" />
          </div>
          <button type="submit" class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 font-semibold text-white hover:bg-indigo-500">Sign Up</button>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
