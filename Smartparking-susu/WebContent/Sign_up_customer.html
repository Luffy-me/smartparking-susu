<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | That's My Spot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    a,
    button {
      min-width: 44px;
      min-height: 44px;
      touch-action: manipulation;
    }

    a:focus-visible,
    button:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(129, 140, 248, 0.95);
      outline-offset: 2px;
    }

    a:active,
    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100">
  <div class="mx-auto flex min-h-screen max-w-6xl flex-col px-4 py-6">
    <header class="mb-8 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <img src="images/logo.jpg" alt="That's My Spot logo" class="h-10 w-10 rounded-xl object-cover" />
        <span class="font-semibold">That's My Spot</span>
      </a>
      <a href="Sign_in_customer.html" class="rounded-lg border border-slate-500 px-4 py-2 text-sm text-slate-100 hover:border-indigo-300 hover:bg-slate-800">Already have an account?</a>
    </header>

    <main class="grid flex-1 items-center gap-8 md:grid-cols-2">
      <section>
        <h1 class="text-4xl font-bold">Create your account</h1>
        <p class="mt-3 text-slate-200">Register once and quickly reserve parking spots for your vehicle.</p>
      </section>

      <section class="rounded-2xl border border-slate-700 bg-slate-900/90 p-6 shadow-2xl">
        <h2 class="text-2xl font-semibold text-white">Create account details</h2>
        <p class="mt-2 text-sm text-slate-200">All fields are required.</p>
        <div id="form-status" class="mt-4 hidden rounded-lg border px-4 py-3 text-sm font-medium" role="status" aria-live="polite"></div>
        <form id="sign-up-form" action="Sign_up_cust_servlet" method="post" novalidate class="mt-5 space-y-4">
          <div>
            <label class="mb-2 block text-sm text-slate-100" for="cust_name">Customer Name</label>
            <input id="cust_name" name="cust_name" type="text" required aria-describedby="cust_name-error" class="w-full rounded-lg border border-slate-600 bg-slate-950 px-3 py-2.5 outline-none ring-indigo-500/30 focus:ring" />
            <p id="cust_name-error" class="mt-2 hidden text-sm font-medium text-rose-300"></p>
          </div>
          <div>
            <label class="mb-2 block text-sm text-slate-100" for="V_number">Vehicle Number</label>
            <input id="V_number" name="V_number" type="text" maxlength="10" required aria-describedby="V_number-error" class="w-full rounded-lg border border-slate-600 bg-slate-950 px-3 py-2.5 outline-none ring-indigo-500/30 focus:ring" />
            <p id="V_number-error" class="mt-2 hidden text-sm font-medium text-rose-300"></p>
          </div>
          <div>
            <label class="mb-2 block text-sm text-slate-100" for="V_type">Vehicle Type (0 = Bike, 1 = Car)</label>
            <input id="V_type" name="V_type" type="text" maxlength="1" inputmode="numeric" required aria-describedby="V_type-error" class="w-full rounded-lg border border-slate-600 bg-slate-950 px-3 py-2.5 outline-none ring-indigo-500/30 focus:ring" />
            <p id="V_type-error" class="mt-2 hidden text-sm font-medium text-rose-300"></p>
          </div>
          <div>
            <label class="mb-2 block text-sm text-slate-100" for="cust_pwd">Password</label>
            <input id="cust_pwd" name="cust_pwd" type="password" minlength="8" required aria-describedby="cust_pwd-error" class="w-full rounded-lg border border-slate-600 bg-slate-950 px-3 py-2.5 outline-none ring-indigo-500/30 focus:ring" />
            <p id="cust_pwd-error" class="mt-2 hidden text-sm font-medium text-rose-300"></p>
          </div>
          <button type="submit" class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 font-semibold text-white hover:bg-indigo-500 active:bg-indigo-700">Sign Up</button>
        </form>
      </section>
    </main>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('sign-up-form');
      const status = document.getElementById('form-status');
      const params = new URLSearchParams(window.location.search);
      const fields = [
        { id: 'cust_name', validate: function (value) { return value.trim().length >= 2; }, message: 'Enter at least 2 characters for customer name.' },
        { id: 'V_number', validate: function (value) { return /^[A-Za-z0-9-]{4,10}$/.test(value.trim()); }, message: 'Vehicle number must be 4-10 characters (letters, numbers, or hyphens).' },
        { id: 'V_type', validate: function (value) { return value.trim() === '0' || value.trim() === '1'; }, message: 'Vehicle type must be 0 (Bike) or 1 (Car).' },
        { id: 'cust_pwd', validate: function (value) { return value.trim().length >= 8; }, message: 'Password must be at least 8 characters long.' }
      ];

      const setStatus = function (message, isError) {
        if (!status) {
          return;
        }
        status.textContent = message;
        status.classList.remove('hidden', 'border-rose-500/70', 'bg-rose-500/10', 'text-rose-200', 'border-emerald-500/70', 'bg-emerald-500/10', 'text-emerald-200');
        if (isError) {
          status.classList.add('border-rose-500/70', 'bg-rose-500/10', 'text-rose-200');
        } else {
          status.classList.add('border-emerald-500/70', 'bg-emerald-500/10', 'text-emerald-200');
        }
      };

      if (params.get('success') === 'account-created') {
        const hashParams = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
        const customerId = hashParams.get('customerId');
        const message = customerId
          ? 'Account created successfully. Your customer ID is ' + customerId + '. Please sign in from the button above.'
          : 'Account created successfully. Please sign in.';
        setStatus(message, false);
        if (customerId) {
          history.replaceState(null, '', window.location.pathname + window.location.search);
        }
      }

      if (params.get('error') === 'invalid-vehicle-type') {
        setStatus('Sign-up failed. Vehicle type must be 0 (Bike) or 1 (Car).', true);
      } else if (params.get('error') === 'server') {
        setStatus('Unable to sign up right now. Please try again shortly.', true);
      }

      const showFieldError = function (input, errorElement, message) {
        errorElement.textContent = message;
        errorElement.classList.remove('hidden');
        input.setAttribute('aria-invalid', 'true');
        input.classList.add('border-rose-500', 'ring-rose-500/30');
      };

      const clearFieldError = function (input, errorElement) {
        errorElement.textContent = '';
        errorElement.classList.add('hidden');
        input.removeAttribute('aria-invalid');
        input.classList.remove('border-rose-500', 'ring-rose-500/30');
      };

      const validateAll = function () {
        let valid = true;
        fields.forEach(function (fieldConfig) {
          const input = document.getElementById(fieldConfig.id);
          const errorElement = document.getElementById(fieldConfig.id + '-error');
          if (!input || !errorElement) {
            return;
          }
          clearFieldError(input, errorElement);
          if (!fieldConfig.validate(input.value)) {
            showFieldError(input, errorElement, fieldConfig.message);
            valid = false;
          }
        });
        if (!valid) {
          setStatus('Please fix the highlighted fields and try again.', true);
        }
        return valid;
      };

      fields.forEach(function (fieldConfig) {
        const input = document.getElementById(fieldConfig.id);
        const errorElement = document.getElementById(fieldConfig.id + '-error');
        if (!input || !errorElement) {
          return;
        }
        input.addEventListener('input', function () {
          clearFieldError(input, errorElement);
        });
      });

      if (form) {
        form.addEventListener('submit', function (event) {
          if (!validateAll()) {
            event.preventDefault();
          }
        });
      }
    });
  </script>
</body>
</html>
