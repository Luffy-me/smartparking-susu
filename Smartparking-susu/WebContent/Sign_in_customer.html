<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | That's My Spot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100">
  <div class="mx-auto flex min-h-screen max-w-6xl flex-col px-4 py-6">
    <header class="mb-8 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <img src="images/logo.jpg" alt="Logo" class="h-10 w-10 rounded-xl object-cover" />
        <span class="font-semibold">That's My Spot</span>
      </a>
      <a href="Sign_up_customer.html" class="rounded-lg border border-slate-600 px-4 py-2 text-sm hover:border-slate-400">Create account</a>
    </header>

    <main class="grid flex-1 items-center gap-8 md:grid-cols-2">
      <section>
        <h1 class="text-4xl font-bold">Welcome back</h1>
        <p class="mt-3 text-slate-300">Sign in to view bookings, reserve spots, and manage your parking sessions.</p>
      </section>

      <section class="rounded-2xl border border-slate-800 bg-slate-900/80 p-6 shadow-2xl">
        <form action="Sign_in_Customer" method="post" class="space-y-5">
          <div>
            <label class="mb-2 block text-sm text-slate-300" for="uname">Customer ID</label>
            <input id="uname" name="uname" type="text" required class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 outline-none ring-indigo-500/30 focus:ring" />
          </div>
          <div>
            <label class="mb-2 block text-sm text-slate-300" for="pwd">Password</label>
            <input id="pwd" name="pwd" type="password" required class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 outline-none ring-indigo-500/30 focus:ring" />
          </div>
          <button type="submit" class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 font-semibold text-white hover:bg-indigo-500">Sign In</button>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
