<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | That's My Spot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    a,
    button {
      min-width: 44px;
      min-height: 44px;
      touch-action: manipulation;
    }

    a:focus-visible,
    button:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(129, 140, 248, 0.95);
      outline-offset: 2px;
    }

    a:active,
    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100">
  <div class="mx-auto flex min-h-screen max-w-6xl flex-col px-4 py-6">
    <header class="mb-8 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <img src="images/logo.jpg" alt="That's My Spot logo" class="h-10 w-10 rounded-xl object-cover" />
        <span class="font-semibold">That's My Spot</span>
      </a>
      <a href="Sign_up_customer.html" class="rounded-lg border border-slate-500 px-4 py-2 text-sm text-slate-100 hover:border-indigo-300 hover:bg-slate-800">Create account</a>
    </header>

    <main class="grid flex-1 items-center gap-8 md:grid-cols-2">
      <section>
        <h1 class="text-4xl font-bold">Welcome back</h1>
        <p class="mt-3 text-slate-200">Sign in to view bookings, reserve spots, and manage your parking sessions.</p>
      </section>

      <section class="rounded-2xl border border-slate-700 bg-slate-900/90 p-6 shadow-2xl">
        <h2 class="text-2xl font-semibold text-white">Sign in to your account</h2>
        <p class="mt-2 text-sm text-slate-200">Use your customer ID and password.</p>
        <div id="form-status" class="mt-4 hidden rounded-lg border px-4 py-3 text-sm font-medium" role="status" aria-live="polite"></div>
        <form id="sign-in-form" action="Sign_in_Customer" method="post" novalidate class="mt-5 space-y-5">
          <div>
            <label class="mb-2 block text-sm text-slate-100" for="uname">Customer ID</label>
            <input id="uname" name="uname" type="text" inputmode="numeric" required aria-describedby="uname-error" class="w-full rounded-lg border border-slate-600 bg-slate-950 px-3 py-2.5 outline-none ring-indigo-500/30 focus:ring" />
            <p id="uname-error" class="mt-2 hidden text-sm font-medium text-rose-300"></p>
          </div>
          <div>
            <label class="mb-2 block text-sm text-slate-100" for="pwd">Password</label>
            <input id="pwd" name="pwd" type="password" minlength="8" required aria-describedby="pwd-error" class="w-full rounded-lg border border-slate-600 bg-slate-950 px-3 py-2.5 outline-none ring-indigo-500/30 focus:ring" />
            <p id="pwd-error" class="mt-2 hidden text-sm font-medium text-rose-300"></p>
          </div>
          <button type="submit" class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 font-semibold text-white hover:bg-indigo-500 active:bg-indigo-700">Sign In</button>
        </form>
      </section>
    </main>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('sign-in-form');
      const status = document.getElementById('form-status');
      const uname = document.getElementById('uname');
      const pwd = document.getElementById('pwd');
      const unameError = document.getElementById('uname-error');
      const pwdError = document.getElementById('pwd-error');
      const params = new URLSearchParams(window.location.search);

      const setStatus = function (message, isError) {
        if (!status) {
          return;
        }
        status.textContent = message;
        status.classList.remove('hidden', 'border-rose-500/70', 'bg-rose-500/10', 'text-rose-200', 'border-emerald-500/70', 'bg-emerald-500/10', 'text-emerald-200');
        if (isError) {
          status.classList.add('border-rose-500/70', 'bg-rose-500/10', 'text-rose-200');
        } else {
          status.classList.add('border-emerald-500/70', 'bg-emerald-500/10', 'text-emerald-200');
        }
      };

      if (params.get('success') === 'account-created') {
        const customerId = params.get('customerId');
        const successText = customerId
          ? 'Account created successfully. Your customer ID is ' + customerId + '. Sign in to continue.'
          : 'Account created successfully. Sign in to continue.';
        setStatus(successText, false);
      }

      if (params.get('error') === 'invalid-credentials') {
        setStatus('Sign-in failed. Please check your customer ID and password.', true);
      } else if (params.get('error') === 'server') {
        setStatus('Unable to sign in right now. Please try again shortly.', true);
      }

      const showFieldError = function (input, errorElement, message) {
        errorElement.textContent = message;
        errorElement.classList.remove('hidden');
        input.setAttribute('aria-invalid', 'true');
        input.classList.add('border-rose-500', 'ring-rose-500/30');
      };

      const clearFieldError = function (input, errorElement) {
        errorElement.textContent = '';
        errorElement.classList.add('hidden');
        input.removeAttribute('aria-invalid');
        input.classList.remove('border-rose-500', 'ring-rose-500/30');
      };

      const validate = function () {
        let valid = true;
        clearFieldError(uname, unameError);
        clearFieldError(pwd, pwdError);

        const trimmedCustomerId = uname.value.trim();
        const parsedCustomerId = Number(trimmedCustomerId);
        if (!/^\d+$/.test(trimmedCustomerId) || !Number.isInteger(parsedCustomerId) || parsedCustomerId <= 0) {
          showFieldError(uname, unameError, 'Customer ID must be a positive number.');
          valid = false;
        }

        if (pwd.value.trim().length < 8) {
          showFieldError(pwd, pwdError, 'Password must be at least 8 characters long.');
          valid = false;
        }

        if (!valid) {
          setStatus('Please fix the highlighted fields and try again.', true);
        }
        return valid;
      };

      [uname, pwd].forEach(function (field) {
        field.addEventListener('input', function () {
          if (field === uname) {
            clearFieldError(uname, unameError);
          } else {
            clearFieldError(pwd, pwdError);
          }
        });
      });

      if (form) {
        form.addEventListener('submit', function (event) {
          if (!validate()) {
            event.preventDefault();
          }
        });
      }
    });
  </script>
</body>
</html>
