<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Links | That's My Spot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    a,
    button {
      min-width: 44px;
      min-height: 44px;
      touch-action: manipulation;
    }

    a:focus-visible,
    button:focus-visible {
      outline: 3px solid rgba(129, 140, 248, 0.95);
      outline-offset: 2px;
    }

    a:active,
    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto flex min-h-screen max-w-3xl items-center justify-center px-4">
    <div class="w-full rounded-2xl border border-slate-800 bg-slate-900 p-8 text-center">
      <img src="images/logo.jpg" alt="That's My Spot logo" class="mx-auto h-14 w-14 rounded-xl object-cover" />
      <h1 class="mt-4 text-2xl font-semibold">That's My Spot</h1>
      <p class="mt-2 text-slate-300">Continue to your account.</p>
      <a href="Sign_in_customer.html" class="mt-6 inline-block rounded-lg bg-indigo-600 px-5 py-2.5 font-semibold text-white hover:bg-indigo-500 active:bg-indigo-700">Sign In</a>
    </div>
  </main>
</body>
</html>
