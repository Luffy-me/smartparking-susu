<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Links | That's My Spot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    a,
    button {
      min-width: 44px;
      min-height: 44px;
      touch-action: manipulation;
    }

    a:focus-visible,
    button:focus-visible {
      outline: 3px solid rgba(129, 140, 248, 0.95);
      outline-offset: 2px;
    }

    a:active,
    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto max-w-4xl px-4 py-10">
    <a href="index.html" class="inline-flex rounded-lg border border-slate-500 px-4 py-2 text-sm text-slate-100 hover:border-indigo-300 hover:bg-slate-800">Back to Home</a>
    <section class="mt-6 rounded-2xl border border-slate-800 bg-slate-900 p-6">
      <h1 class="text-3xl font-bold">Social Links</h1>
      <p class="mt-3 text-slate-200">Official profile handles are being finalized. For updates, follow this page or contact support.</p>
      <div class="mt-6 grid gap-3 text-slate-200">
        <article id="instagram" class="rounded-lg border border-slate-800 bg-slate-950 p-4">
          <p class="font-semibold text-white">Instagram</p>
          <p class="mt-1 text-sm text-slate-300">Official profile coming soon.</p>
        </article>
        <article id="x" class="rounded-lg border border-slate-800 bg-slate-950 p-4">
          <p class="font-semibold text-white">X (Twitter)</p>
          <p class="mt-1 text-sm text-slate-300">Official profile coming soon.</p>
        </article>
        <article id="facebook" class="rounded-lg border border-slate-800 bg-slate-950 p-4">
          <p class="font-semibold text-white">Facebook</p>
          <p class="mt-1 text-sm text-slate-300">Official profile coming soon.</p>
        </article>
        <article id="linkedin" class="rounded-lg border border-slate-800 bg-slate-950 p-4">
          <p class="font-semibold text-white">LinkedIn</p>
          <p class="mt-1 text-sm text-slate-300">Official profile coming soon.</p>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
