<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | That's My Spot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="mx-auto flex min-h-screen max-w-5xl flex-col px-4 py-8">
    <header class="mb-10 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <img src="images/logo.jpg" alt="Logo" class="h-10 w-10 rounded-xl object-cover" />
        <span class="font-semibold">That's My Spot</span>
      </a>
      <a href="index.html" class="rounded-lg border border-slate-700 px-4 py-2 text-sm hover:border-slate-500">Back to Home</a>
    </header>

    <main class="grid gap-8 md:grid-cols-2">
      <section class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
        <h1 class="text-3xl font-bold">Contact Us</h1>
        <p class="mt-3 text-slate-300">Need help with bookings, billing, or parking spot availability? Reach out to us.</p>
        <div class="mt-6 space-y-4 text-slate-300">
          <p><span class="block text-sm text-slate-400">Phone</span>9535701911</p>
          <p><span class="block text-sm text-slate-400">Address</span>MSRIT, Mattikere, Bangalore</p>
          <p><span class="block text-sm text-slate-400">Email</span><a class="text-indigo-300 hover:text-white" href="mailto:contact@thatsmyspot.com">contact@thatsmyspot.com</a></p>
        </div>
      </section>

      <section class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
        <h2 class="text-2xl font-semibold">Send a Message</h2>
        <form class="mt-5 space-y-4" action="mailto:contact@thatsmyspot.com" method="post" enctype="text/plain">
          <div>
            <label for="name" class="mb-2 block text-sm text-slate-300">Name</label>
            <input id="name" name="name" type="text" required class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 outline-none focus:border-indigo-500" />
          </div>
          <div>
            <label for="email" class="mb-2 block text-sm text-slate-300">Email</label>
            <input id="email" name="email" type="email" required class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 outline-none focus:border-indigo-500" />
          </div>
          <div>
            <label for="message" class="mb-2 block text-sm text-slate-300">Message</label>
            <textarea id="message" name="message" rows="5" required class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 outline-none focus:border-indigo-500"></textarea>
          </div>
          <button type="submit" class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 font-semibold text-white hover:bg-indigo-500">Send Message</button>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
